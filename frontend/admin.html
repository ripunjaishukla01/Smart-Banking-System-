<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="loadAdminDashboard()">
  <div class="dashboard-layout">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <button onclick="showAdminSection('adminOverview')">Overview</button>
      <button onclick="showAdminSection('adminUsersSection')">Users</button>
      <button onclick="showAdminSection('adminTransactionsSection')">Transactions</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h1>Admin Dashboard</h1>
        <div class="welcome-box">Secure Control Panel</div>
      </div>

      <section id="adminOverview" class="section">
        <div class="card-grid">
          <div class="info-card">
            <h3>Total Users</h3>
            <p id="totalUsers">0</p>
          </div>
          <div class="info-card">
            <h3>Total Transactions</h3>
            <p id="totalTransactions">0</p>
          </div>
          <div class="info-card">
            <h3>System Status</h3>
            <p>Active</p>
          </div>
        </div>
      </section>

      <section id="adminUsersSection" class="section hidden">
        <div class="panel">
          <h2>All Users</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Account Number</th>
                  <th>Balance</th>
                  <th>Role</th>
                </tr>
              </thead>
              <tbody id="adminUsersTable"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="adminTransactionsSection" class="section hidden">
        <div class="panel">
          <h2>All Transactions</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Sender</th>
                  <th>Receiver</th>
                  <th>Time</th>
                </tr>
              </thead>
              <tbody id="adminTransactionsTable"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Banking - Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <div class="auth-left">
      <h1>Open Your Account</h1>
      <p>Start your secure digital banking journey in minutes.</p>
    </div>

    <div class="auth-card">
      <h2>Register</h2>
      <input type="text" id="fullName" placeholder="Full Name" />
      <input type="email" id="email" placeholder="Email Address" />
      <input type="password" id="password" placeholder="Password" />
      <input type="number" id="initialBalance" placeholder="Initial Balance" />
      <button onclick="register()">Register</button>
      <p class="auth-link">Already have account? <a href="index.html">Login</a></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
